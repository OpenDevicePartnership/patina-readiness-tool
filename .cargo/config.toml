# - File Sync Settings: https://github.com/OpenDevicePartnership/patina-devops/blob/main/.sync/Files.yml

[env]
PATINA_CONFIG_VERSION = "1"
RUSTC_BOOTSTRAP = "1"

# Restrict the unstable features RUSTC_BOOTSTRAP makes available to only those Patina has accepted
# through the unstable feature process. This [build] entry applies to host builds (tests,
# proc-macros). The UEFI targets below repeat the flag because Cargo does not merge rustflags
# sources. A `--target` build uses `[target.<triple>].rustflags`.
#
# This flag does not work with `-Zbuild-std`. Building std from source rebuilds core, alloc, and
# compiler_builtins, which have their own `#![feature(...)]` gates outside the Patina accepted set, so
# they fail with E0725. If you must run `-Zbuild-std`, override rustflags for that invocation with
# the RUSTFLAGS env var (which replaces these config rustflags), keeping everything else but dropping
# `-Z allow-features`.
[build]
rustflags = [
    "-Z", "allow-features=c_variadic,allocator_api,coverage_attribute",
]

[profile.dev]
# optimize for size
opt-level = "s"
# generate all debug info
debug = true
# retain all debug info
strip = "none"
# assert on debug_assert
debug-assertions = true
# all addition/subtraction can cause panics with overflow/underflow
overflow-checks = true
# do fat LTO
lto = true
# do incremental builds for better compile times
incremental = true

[profile.release]
# optimize for size
opt-level = "s"
# no debug info generated
debug = false
# do fat LTO
lto = true
# do not assert on debug_assert
debug-assertions = false
# no panic on overflow/underflow
overflow-checks = false
# do incremental builds for better compile times
incremental = true

[profile.test]
# no optimizations
opt-level = 0
# generate all debug info
debug = true
# retain all debug info
strip = "none"
# test with debug assertions off so we are testing the release case
debug-assertions = false
# keep the overflow checks to catch these in tests
overflow-checks = true
# disable LTO
lto = false
# do incremental builds for better compile times
incremental = true

[target.x86_64-unknown-uefi]
rustflags = [
    # The Patina binary is a boot service driver
    "-C", "link-arg=/subsystem:efi_boot_service_driver",
    # Forcing frame pointers allows for better stack walking
    "-C", "force-frame-pointers",
    # Preserve stack unwind info
    "-C", "force-unwind-tables",
    # Restrict the unstable features RUSTC_BOOTSTRAP unlocks to the accepted set
    "-Z", "allow-features=c_variadic,allocator_api,coverage_attribute",
]

[target.aarch64-unknown-uefi]
rustflags = [
    # The Patina binary is a boot service driver
    "-C", "link-arg=/subsystem:efi_boot_service_driver",
    # Forcing frame pointers allows for better stack walking
    "-C", "force-frame-pointers",
    # Preserve stack unwind info
    "-C", "force-unwind-tables",
    # Restrict the unstable features RUSTC_BOOTSTRAP unlocks to the accepted set
    "-Z", "allow-features=c_variadic,allocator_api,coverage_attribute",
]
